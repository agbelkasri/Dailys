name: Deploy to Firebase Hosting

# Auto-deploys the React app to Firebase Hosting whenever app code lands
# on `main`. Skips deploys when only the weekly backup output (or its
# related scripts) changes — those don't affect what the site serves.
#
# Can also be triggered manually from the Actions tab via workflow_dispatch.

on:
  push:
    branches: [main]
    paths:
      - 'aap-daily-update/**'
      - '!aap-daily-update/backups/**'
      - '!aap-daily-update/scripts/**'
      - '.github/workflows/deploy-hosting.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aap-daily-update/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: aap-daily-update

      - name: Build production bundle
        # The VITE_FIREBASE_* values and the Microsoft tenant ID are
        # intentionally PUBLIC — they're embedded in every client JS bundle
        # served to users and secured via Firebase Auth + Security Rules,
        # not by keeping them secret. Inlining here avoids needing a
        # parallel set of GitHub secrets just to rebuild what's already
        # served from the live site.
        run: npm run build
        working-directory: aap-daily-update
        env:
          VITE_FIREBASE_API_KEY:             AIzaSyBUBq8q-VC6bDCpTlLFuYNDpXAtL_ABbS4
          VITE_FIREBASE_AUTH_DOMAIN:         dailys-aap.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID:          dailys-aap
          VITE_FIREBASE_STORAGE_BUCKET:      dailys-aap.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '681237206681'
          VITE_FIREBASE_APP_ID:              '1:681237206681:web:2cb753d98e6323a775ca08'
          VITE_FIREBASE_DATABASE_URL:        https://dailys-aap-default-rtdb.firebaseio.com
          VITE_MICROSOFT_TENANT_ID:          f8e3ae36-5152-43b5-a11c-b5ca4e51a5b9

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken:              ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId:              live
          projectId:              dailys-aap
          entryPoint:             aap-daily-update
